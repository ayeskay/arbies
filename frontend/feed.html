<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbies Live Feed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="backdrop-glow"></div>
    <div class="container page-fade-in">
        <header class="topbar">
            <div>
                <p class="eyebrow">Filterable Realtime Tape</p>
                <h1>Live Opportunity Feed</h1>
            </div>
            <nav class="nav-links">
                <a href="/">Dashboard</a>
                <a class="active" href="/feed.html">Live Feed</a>
                <a href="/status.html">Status</a>
                <a href="/test.html">API Lab</a>
            </nav>
        </header>

        <section class="panel reveal-stagger">
            <div class="panel-header">
                <h3>Filter Console</h3>
                <span class="pill"><span id="feed-pill-dot" class="pill-dot"></span><span id="feed-pill-label">Connecting</span></span>
            </div>
            <div class="filter-grid">
                <div class="field">
                    <label for="symbol-filter">Symbol Contains</label>
                    <input id="symbol-filter" type="text" placeholder="btc">
                </div>
                <div class="field">
                    <label for="buy-filter">Buy Venue Contains</label>
                    <input id="buy-filter" type="text" placeholder="okx">
                </div>
                <div class="field">
                    <label for="sell-filter">Sell Venue Contains</label>
                    <input id="sell-filter" type="text" placeholder="binance">
                </div>
                <div class="field">
                    <label for="min-net-bps">Min Net Bps</label>
                    <input id="min-net-bps" type="number" step="0.01" value="0">
                </div>
                <div class="field">
                    <label for="min-gross">Min Gross Spread</label>
                    <input id="min-gross" type="number" step="0.01" value="0">
                </div>
                <div class="field">
                    <label for="max-rows">Max Rows</label>
                    <input id="max-rows" type="number" min="10" max="500" value="60">
                </div>
                <div class="field">
                    <label for="sort-mode">Sort Mode</label>
                    <select id="sort-mode">
                        <option value="newest">Newest First</option>
                        <option value="net_bps">Highest Net Bps</option>
                        <option value="symbol">Symbol A-Z</option>
                    </select>
                </div>
                <div class="field">
                    <label for="clear-filters">Actions</label>
                    <button id="clear-filters" type="button">Reset Filters</button>
                </div>
            </div>
        </section>

        <section class="panel reveal-stagger">
            <div class="panel-header">
                <h3>Filtered Tape</h3>
                <p id="feed-stats">Events: 0 | Showing: 0</p>
            </div>
            <div class="table-wrapper">
                <table id="feed-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Symbol</th>
                            <th>Buy Venue</th>
                            <th>Ask</th>
                            <th>Sell Venue</th>
                            <th>Bid</th>
                            <th>Gross Spread</th>
                            <th>Net Bps</th>
                        </tr>
                    </thead>
                    <tbody id="feed-body"></tbody>
                </table>
            </div>
        </section>

        <section class="panel reveal-stagger">
            <div class="panel-header">
                <h3>Raw Payload Stream</h3>
                <p>Useful for debugging incoming event shape.</p>
            </div>
            <div class="raw-controls">
                <button id="toggle-raw" class="btn-primary" type="button">Show Raw Stream</button>
                <button id="clear-raw" class="btn-danger" type="button">Clear Raw</button>
            </div>
            <div id="raw-log" class="raw-log"></div>
        </section>
    </div>
    <script src="ui.js"></script>
    <script type="module" src="/js/pages/feed.page.js"></script>
</body>
</html>
