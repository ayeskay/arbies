<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbies System Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="backdrop-glow"></div>
    <div class="container page-fade-in">
        <header class="topbar">
            <div>
                <p class="eyebrow">Operational Snapshot</p>
                <h1>System Status</h1>
            </div>
            <nav class="nav-links">
                <a href="/">Dashboard</a>
                <a href="/feed.html">Live Feed</a>
                <a class="active" href="/status.html">Status</a>
                <a href="/test.html">API Lab</a>
            </nav>
        </header>

        <section class="split-grid reveal-stagger">
            <article class="panel">
                <div class="panel-header">
                    <h3>Health Endpoint</h3>
                    <span class="pill"><span id="health-dot" class="pill-dot"></span><span id="health-label">Checking</span></span>
                </div>
                <p class="subtle" id="health-detail">Awaiting /api/health response</p>
                <div class="response-box" id="health-json">Waiting...</div>
            </article>

            <article class="panel">
                <div class="panel-header">
                    <h3>State Summary</h3>
                    <p id="state-meta">Polling /api/state every 5s</p>
                </div>
                <div class="metric-grid" style="margin: 0;">
                    <article class="metric-card">
                        <p>Tracked Symbols</p>
                        <h2 id="tracked-symbols">0</h2>
                    </article>
                    <article class="metric-card">
                        <p>Venue Entries</p>
                        <h2 id="venue-entries">0</h2>
                    </article>
                </div>
                <div class="response-box" id="state-sample">Waiting...</div>
            </article>
        </section>
    </div>

    <script src="ui.js"></script>
    <script type="module" src="/js/pages/status.page.js"></script>
</body>
</html>
